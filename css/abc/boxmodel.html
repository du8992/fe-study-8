<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        .box1 {
            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;

            display: none;
        }

        .box2 {
            width: 200px;
            height: 100px;
            border: 1px solid black;
            
            margin: 10px;
            padding: 10px;
            display: block;
            
        }

        .box3 {
            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;
            display: inline-block;
        }

        .span1{
            width: 200px;
            height: 100px;
            display: inline;
        }

        .parent {
            width: 200px;
            height: 100px;
            border: 1px solid black;
        }

        .parent:hover .child {
            display: block;
        }

        .child {
            width: 100px;
            height: 50px;
            border: 1px solid red;

            display: none;
        }

        .parent:hover .parent-span {
            color: blue;
            text-decoration: underline;
        }


    </style>

</head>
<body>
    
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>

    <span class="span1">span1</span>
    <span>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Est repellat tenetur a provident, beatae voluptatibus nostrum magnam, voluptate et itaque minus hic consequatur id recusandae maiores expedita praesentium accusantium suscipit!</span>

    <div class="parent">
        <span class="parent-span">parent</span>
        <div class="child">child</div>
    </div>
    
</body>
</html>
