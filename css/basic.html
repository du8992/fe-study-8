<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 내부 스타일 시트 방식 -->
    <style>
        h1 { color: red;}

        h3 { color: purple;}
    </style>
    <link rel="stylesheet" href="basic.css">

</head>
<body>
    <h1>CSS BASIC</h1>
    <h1 style="color: blue;">CSS BASIC</h1>
    <!-- 인라인 > 외부 스티일 시트 == 내부 스타일 시트 (내외부는 순서 차이) -->
    <!-- 현 코드 상에서는 내부 스타일 -> 외부 순이므로 외부가 적용 -->
    <h2 style="color: darkcyan;" id="hhh2">CSS h2 tag</h2>
    <h3>CSS h3 tag</h3>
    <h4>CSS h4 tag</h4>
</body>
</html>
