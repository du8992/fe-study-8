<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>form01</h1>

    <form id="form_id" action="method" >

        <label>아이디 <input type="text" id="input_id" placeholder="아이디를 입력해주세요"></label>
        <br><br>
        <label>비번 : <input type="password" id="input_pw"></label>

        <button type="submit" id="btn_submit">로그인버튼(submit)</button>
        <button type="button" id="btn_normal">그냥버튼</button>
        <br><br>
        <button type="button" id="btn_extra">extra 버튼</button>
    </form>

    <script>
        const input_id = document.getElementById('input_id');
        const input_pw = document.getElementById('input_pw');

        const btn_submit = document.getElementById('btn_submit');
        const btn_normal = document.getElementById('btn_normal');
        const btn_extra = document.getElementById('btn_extra');

        btn_normal.addEventListener('click', ()=>{
            console.log( input_id.value);
            console.log( input_pw.value);

            input_id.value = 'valuevalue';
        })
        

        input_id.addEventListener('focus', ()=>{
            console.log('input_id 요소에 focus 잡힘');
        })

        input_pw.addEventListener('focus', ()=>{
            console.log('input_pw 요소에 focus 잡힘');
        })

        btn_extra.addEventListener('click', ()=>{
            btn_normal.click();
            input_pw.focus();
        })

        input_id.addEventListener('keydown', (event)=>{
            console.log(event.key);
            console.log(input_id.value);

            if (event.key === 'Enter') {
                event.preventDefault(); // 엔터의 기본 동작(제출)을 막음

            
                if (input_id.value.trim() === '') {
                    alert('아이디를 먼저 입력해주세요!');
                    input_id.focus(); 
                } else {
                    console.log('아이디 입력됨:', input_id.value);
                    input_pw.focus();
                }
            }
        })

        document.getElementById('form_id').addEventListener('submit', (event)=>{
            console.log("폼 submit 이 발생");
            event.preventDefault();

            if( input_id.value.trim() == ''){
                alert('아이디 필수입력입니다.');
                input_id.value = input_id.value.trim();
                input_id.focus();
                return;
            }
            if(input_pw.value.trim() == ''){
                alert('비밀번호를 입력하세요.');
                input_pw.focus();
                return;
            }

            if(input_pw.value.trim().length < 8){
                alert('비밀번호 8자리 이상 입력하세요');
                input_pw.focus();
                return;
            }

            document.getElementById('form_id').submit();
        })
    </script>
</body>
</html>
