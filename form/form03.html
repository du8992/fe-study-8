<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: forestgreen;
            position: relative;
            left: 0px;
        }
    </style>
</head>
<body>
    <p id="pid">기본텍스트</p>

    <div class="box"></div>

    <button onclick="clearIntervalBox()">박스 멈추기</button>

    
    <!-- 시계 표시할 곳 추가 -->
    <h2 id="clock">00:00:00</h2> 
    <script>
       setTimeout(() => {
            document.getElementById('pid').textContent = '3초 뒤에 바뀐 텍스트';
        }, 3000);

        setTimeout(() => {
            document.getElementById('pid').style.color = 'red';
        }, 5000);
        
        // 2. 박스 움직이기 설정
        const div_box = document.querySelector('.box'); // [0] 대신 querySelector 사용
        let leftValue = 0;

        // ★ 중요: setInterval을 변수 'boxMoveInterval'에 할당해야 멈출 수 있습니다.
        const boxMoveInterval = setInterval(() => {
            leftValue = leftValue + 50;
            div_box.style.left = leftValue + 'px';

            if (leftValue >= 600) {
                leftValue = 0;
            }
            console.log("현재 위치:", div_box.style.left);
        }, 1000);

        // 3. 박스 멈춤 함수
        function clearIntervalBox() {
            console.log('박스 멈춤 버튼 클릭됨');
            clearInterval(boxMoveInterval); // 이제 정상적으로 멈춥니다.
        }

        // 4. 시계 기능 (1초마다 업데이트)
        setInterval(() => {
            const current = new Date();
            const time = String(current.getHours()).padStart(2, '0')
                + ":" + String(current.getMinutes()).padStart(2, '0')
                + ":" + String(current.getSeconds()).padStart(2, '0');

            const clockElement = document.getElementById('clock');
            if (clockElement) {
                clockElement.textContent = time;
            }
        }, 1000);

    </script>
    
</body>
</html>
