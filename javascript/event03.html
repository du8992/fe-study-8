<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 500px;
            height: 500px;
            background-color: antiquewhite;
        }
        .box :hover {
            background-color: rgb(169, 87, 87);
        }

        
    </style>
</head>
<body>
    
    <button id="btn1" onclick="btn_click()">버튼1</button>
    <div class="box"></div>

    <script>
        const btn_click = ()=>{
            console.log('btn 버튼1 눌림');
        }

        const divBox = document.getElementsByClassName('box')[0];

        divBox.onmouseover = ()=>{
            console.log("마우스가 올라옴");
        }

        divBox.addEventListener('mouseout', ()=>{

            console.log("마우스가 움직임");
        })
        divBox.addEventListener('wheel', ()=>{
            console.log("마우스 휠 움직임");
        })

        divBox.addEventListener('click', (event)=>{
            console.log(event);
        })

        divBox.addEventListener('click', (event)=>{

        })
    </script>

</body>
</html>
