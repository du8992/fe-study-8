<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
/* 필요시 작성 */
</style>
</head>
<body>
<div class="container">
<div id="main">
<p id="p1">p1 텍스트</p>
<p id="p2">p2 텍스트</p>
</div>
</div>
<button onclick="changeMain()">main 배경색 gray로 변경</button>
<!-- <button onclick="changeMain1()">main 배경색 white로 변경</button> -->
<button onclick="changeP1()">p1 글자색 red로 변경</button>
<!-- <button onclick="changeP1_1()">p1 글자색 black로 변경</button> -->
<button onclick="changeP2()">"p2 텍스트"를 "p2 글자" 로 변경</button>


<script>
/* 코드 작성 부분 */
let isClicked = false; 

function changeMain() {
    const main = document.getElementById('main');
    
    if (isClicked === false) {
        main.style.backgroundColor = 'gray';
        isClicked = true; 
    } else {
        main.style.backgroundColor = 'white';
        isClicked = false; 
    }
}

        // function changeMain1() {
        //     console.log('changeMain1() 호출됨');
        //     document.getElementById('main').style.backgroundColor = 'white';
            
        // }
let isClicked1 = false;
function changeP1() {
    if (isClicked1 === false) {
        document.getElementById('p1').style.color = 'red';
        isClicked1 = true; 
    } else {
        document.getElementById('p1').style.color = 'black';
        isClicked1 = false; 
    }
        }
// function changeP1_1() {
//             console.log('changeP1_1() 호출됨');
//             document.getElementById('p1').textContent = 'p1 텍스트';
//             document.getElementById('p1').style.color = 'black';
//         }
let isClicked2 = 0;
function changeP2() {
            console.log('changeP2() 호출됨');
            // document.getElementById('p2').textContent = 'p2 글자';
            // document.getElementById('p2').style.color = 'red';
            isClicked2 = isClicked2 + 1;
                if(isClicked2 == 1){
                    document.getElementById('p2').textContent = 'p2 하나';
                }
                else if(isClicked2 == 2){
                    document.getElementById('p2').textContent = 'p2 둘';
                }
                else if(isClicked2 == 3){
                    document.getElementById('p2').textContent = 'p2 셋';
                }
                else if(isClicked2 == 4){
                    document.getElementById('p2').textContent = 'p2 넷';
                }
                else{
                    document.getElementById('p2').textContent = 'p2 텍스트';
                    isClicked2 = 0;
                }
            }
        
</script>
</body>
</html>
