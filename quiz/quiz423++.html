<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="ID">사용자 ID : </label>
        <input type="text" id="ID">
        <br><br>
        <label for="password">비밀 번호 : </label>
        <input type="password" id="password">
        <input type="button" value="완료">
        <br><br>
            <select id="selectCf">
                <option value="1">짜장면</option>
                <option value="2" selected>짬뽕</option>
                <option value="3">탕수육</option> 
            </select>

            <br>

        <label>짜장면<input type="checkbox"></label>
        <label>짬뽕<input type="checkbox" checked></label>
        <label>탕수육<input type="checkbox"></label>

        <br>

        <label for="name">이름 :</label>  
        <input type="text" id="name">

        <br>

        <label for="number">암호 :</label>
        <input type="password" id="number">

        <br>

            <label>자소서</label>
            <br>
            <textarea >이곳에 자기소개서 작성</textarea>

        <br><br>

        <label for="search">검색 : </label>
        <input type="text" id="search">
        <input type="button" value="전송1">
        <button type="button">전송2</button>

        <br>
        <label>submit 버튼 : </label>
        <input type="submit" value="전송1">
        <button>전송2</button>

        <br>
        
        <label>reset 버튼 : </label>
        <input type="reset" value="전송1">
        <button type="reset">전송2</button>
    </form>
</body>
</html>
