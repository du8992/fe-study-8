<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <label for="name">고객명 : </label>
        <input type="text" id="name">
        <br><br>
        <label for="number">전화번호 : </label>
        <input type="text">
        <br><br>
        <label for="mail">E-mail : </label>
        <input type="text">
        <p>
            <label for="selectCf">피자선택 :</label>
            <select id="selectCf">
                <option value="1" selected disabled hidden>피자를선택해주세요</option>
                <option value="2">치즈</option>
                <option value="3">페퍼로니</option>
                <option value="4">콤비네이션</option> 
            </select>
        </p>
        <br>
        <fieldset>
            <legend>피자 사이즈</legend>
                <label>
                    <input type="radio" name="cfSize">Small
                </label>
                <br><br>
                <label>
                    <input type="radio" name="cfSize">Medium
                </label>
                <br><br>
                <label>
                    <input type="radio" name="cfSize">Large
                </label>
        </fieldset>
        <br>
        <fieldset>
            <legend>토핑 선택</legend>
            <input type="checkbox"><label>베이컨</label>
            <br><br>
            <input type="checkbox"><label>치즈</label>
            <br><br>
            <input type="checkbox"><label>양파</label>
            <br><br>
            <input type="checkbox"><label>버섯</label>
        </fieldset>
        <br>
        <input type="time">
        <p>
            <label>배송시 요청사항</label>
            <br>
            <textarea></textarea>
        </p>
        <input type="submit" value="주문하기">
    </form>
</body>
</html>
