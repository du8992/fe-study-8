<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Morning coffe</h1>
    <form action="#">
        <label for="name">지점명 : </label>
        <input type="text" id="name" value="천안역점">
        <p>
            <label for="selectCf">MENU :</label>
            <select id="selectCf">
                <option value="1">아메리카노</option>
                <option value="2">카페라떼</option>
            </select>
        </p>

        <fieldset>
            <legend>SIZE</legend>
                <label>
                    <input type="radio" name="cfSize">Tall
                </label>
                <label>
                    <input type="radio" name="cfSize">Grande
                </label>
        </fieldset>
        <br>
        <fieldset>
            <legend>OPTION</legend>
            <input type="checkbox"><label>샷추가</label>
            <input type="checkbox"><label>크림추가</label>
            <input type="checkbox"><label>포장</label>
        </fieldset>
        <p>
            <label>배송요청사항</label>
            <br>
            <textarea></textarea>
        </p>
        <input type="submit" value="주문완료">
    </form>
    <!--빈칸 정답 : 1.head 2./head 3.body 4.커피 5.value 6.select 7./select 8."radio" 9.type = "checkbox"-->
</body>
</html>
