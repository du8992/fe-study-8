<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <!--
        강조
        *페이지 의미 분선
        *웹접근성
        strong 두껍게
        em 기울게
        -->

        <p><strong>접근</strong> 금지</p>
        <p><em>미 리 주 문</em> 해야합니다</p>

        <br><br>

        <!-- 시각적으로 강조하기 -->
        <p><b>접근</b> 금지</p>
        <p><i>미 리 주 문</i> 해야합니다</p>

        <!--
        위 아래의 차이 
        위에는 코드적으로도 중요하다고 강조
        아래는 그냥 저렇게 보이기만 하면 됨
        (semantic web - 의미를 중시해서 만들자(그냥 회사마다 상황마다 다름))
        -->
    </body>
</html>
